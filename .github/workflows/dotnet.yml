# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # We use 9.0.x to support the new .slnx solution format parsing
        dotnet-version: 9.0.x

    - name: Restore dependencies
      # Targeting the .slnx directly ensures all projects are restored
      run: dotnet restore UsersAPI.slnx

    - name: Build
      # Explicitly building the .slnx solution
      run: dotnet build UsersAPI.slnx --configuration Release --no-restore

    - name: Test
      # Pointing directly to the .Tests.csproj is the most reliable way 
      # to ensure the runner finds and executes your 30+ tests.
      run: dotnet test UsersAPI.Tests/UsersAPI.Tests.csproj --configuration Release --no-build --verbosity normal
